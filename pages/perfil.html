<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liberô</title>
    <link rel="shortcut icon" href="../img/icone.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/perfil.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/menu.css">
</head>
<body>

    <div id="anuncio" class="anuncio desativar">
        <div class="fecharAnuncio" onclick="fecharAnuncio()">X</div>
        <div class="containerAnuncio">
            <h2>Anunciar novo item</h2>

            <div class="upload">
                <div class="uploadImg">
                    <input type="file">
                </div>
                <div class="uploadImgConcluidas">
                    <img src="https://www.estadao.com.br/recomenda/wp-content/uploads/2024/03/Geladeira-Consul-Frost-Free-342-litros_hero.jpg-e1709645779986.webp" alt="">
                </div>
            </div>

            <label> O que você quer liberar?</label>
            <input type="text" placeholder="Ex: Sofá de 3 lugares, Lote de livros, Restos de obra...">
            
            <div class="opcoesAnuncio">
                <div class="infoAnuncio">
                    <label>Categorias</label>
                    <select name="" id="">
                        <option value="outros">Outros</option>
                        <option value="roupas">Roupas</option>
                        <option value="livros">Livros</option>
                        <option value="eletronicos">Eletronicos</option>
                        <option value="moveis">Móveis</option>
                        <option value="utensilios">Utensílios</option>
                        <option value="maquinas">Maquinas</option>
                        <option value="entulho">Entulho</option>
                        <option value="sucata">Sucata</option>
                        <option value="construcao">Construção</option>
                        <option value="refeicao">Refeição</option>
                    </select>
                </div>

                <div class="infoAnuncio">
                    <label for="">Duração do Anúncio</label>
                    <select name="" id="">
                        <option value="">1 semana</option>
                        <option value="">15 dias</option>
                        <option value="">1 mês</option>
                    </select>
                </div>
            </div>

            <label for="">Descrição Detalhada</label>
            <textarea name="" id=""></textarea>
            
            <label for="">Volume / Quantidade</label>
            <input type="text" placeholder="Ex: 2 sacolas grandes, 10 unidades...">
        
            <button>Publicar Anuncio</button>
        </div>
    </div>

    <section id="menu" class="menu fixar">
        <div class="containerM">
            <img src="../img/logo.png" alt="">

            <div class="explorar">
                <a href="../index.html">Explorar</a>
            </div>

            <div class="pesquisa">
                <input type="text" placeholder="Faça sua pesquisa" name="" id="">
                <button>Pesquisar</button>
            </div>

            <div>
                <img src="../img/notificacao.svg" alt="">
            </div>

            <div class="perfilMenu">
                <a href="../pages/cadastro.html">Entre</a>
                <p>ou</p>
                <a href="../pages/cadastro.html">Cadastre-se</a>
            </div>
        </div>
    </section>

    <section class="itensAnuncio">

        <button onClick="addAnuncio()">Adicionar anúncio</button>

        <div>
            <h2>Anúncios Ativos</h2>
        </div>
        <div>
            <h2>Anúncios Expirados</h2>
        </div>
        <div>
            <h2>Anúncios Excluidos</h2>
        </div>
    </section>

    <script src="../js/perfil.js"></script>

</body>
</html>
