<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Liberô - Faça login ou cadastre-se para anunciar gratuitamente.">
    <title>Liberô - Entrar / Cadastrar</title>
    <link rel="shortcut icon" href="../img/icone.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/cadastro.css">
</head>
<body>

    <!-- ── Painel Login ─────────────────────────────────────────────────── -->
    <section class="login" id="painelLogin" aria-label="Formulário de login">
        <div class="formInfo">
            <a href="../index.html">
                <img src="../img/logo.png" alt="Liberô">
            </a>
            <h2>Olá, bem-vindo!<br><span>Faça o seu login</span></h2>

            <div id="feedbackLogin" class="feedback" style="display:none" role="alert"></div>

            <form id="formLogin" novalidate>
                <label for="emailLogin">Email</label>
                <input type="email" id="emailLogin" name="email" placeholder="seu@email.com" required autocomplete="email">

                <label for="senhaLogin">Senha</label>
                <input type="password" id="senhaLogin" name="senha" placeholder="Sua senha" required autocomplete="current-password" minlength="6">

                <div class="links">
                    <span></span>
                    <a onclick="transicaoCadastro()" tabindex="0" role="button" aria-label="Ir para cadastro">Cadastre-se</a>
                </div>

                <button type="submit">Entrar</button>
            </form>
        </div>
    </section>

    <!-- ── Imagem de transição ──────────────────────────────────────────── -->
    <div id="trasicao" class="divTransition loginTransition" aria-hidden="true">
        <img src="../img/wallpaper_cadastro.png" alt="">
    </div>

    <!-- ── Painel Cadastro ─────────────────────────────────────────────── -->
    <section class="cadastro" id="painelCadastro" aria-label="Formulário de cadastro">
        <div class="formInfo">
            <a href="../index.html">
                <img src="../img/logo.png" alt="Liberô">
            </a>
            <h2>Olá, bem-vindo!<br><span>Cadastre-se</span></h2>

            <div id="feedbackCadastro" class="feedback" style="display:none" role="alert"></div>

            <form id="formCadastro" novalidate>
                <label for="nomeCadastro">Nome completo</label>
                <input type="text" id="nomeCadastro" name="nome" placeholder="Seu nome completo" required autocomplete="name" minlength="2">

                <label for="emailCadastro">Email</label>
                <input type="email" id="emailCadastro" name="email" placeholder="seu@email.com" required autocomplete="email">

                <label for="senhaCadastro">Senha</label>
                <input type="password" id="senhaCadastro" name="senha" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">

                <label for="confirmaSenha">Confirmar senha</label>
                <input type="password" id="confirmaSenha" name="confirmacao" placeholder="Repita a senha" required minlength="6" autocomplete="new-password">

                <label for="tipoPerfil">Tipo de perfil <span class="obrigatorio">*</span></label>
                <select id="tipoPerfil" name="tipoPerfil" required>
                    <option value="comum">Usuário Comum</option>
                    <option value="ong">ONG / Caridade</option>
                </select>

                <div id="wrapNomeInstituicao" style="display:none; flex-direction:column; gap:4px;">
                    <label for="nomeInstituicao">Nome da Instituição <span class="obrigatorio">*</span></label>
                    <input type="text" id="nomeInstituicao" name="nomeInstituicao" placeholder="Nome oficial da ONG ou instituição" minlength="2" autocomplete="organization">
                </div>

                <a onclick="transitionLogin()" tabindex="0" role="button" aria-label="Ir para login">Já tem uma conta?</a>

                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </section>

    <!-- Socket.io (requer servidor rodando) -->
    <script src="/socket.io/socket.io.js" onerror="console.info('Socket.io não disponível — inicie o servidor com npm start')"></script>

    <script src="../js/utils.js"></script>
    <script src="../js/database.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/realtime.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
