<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liberô</title>
    <link rel="shortcut icon" href="../img/icone.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/cadastro.css">
</head>
<body>

    <section class="login">
            <div class="formInfo">

                <img src="../img/logo.png" alt="">
                <h2>Olá, Bem vindo! <br><span>Faça o seu login</span></h2>
                
                <input type="email" placeholder="digite seu email" id="email" name="email" required>
                <input type="password" placeholder="digite sua senha" id="senha" name="senha" required>
                
                <div class="links">
                    <a>Esqueceu a senha?</a>
                    <a onclick="transicaoCadastro()" >Cadastre-se</a>
                </div>
                <a href="perfil.html">perfil </a> 
                <button>Entrar</button>
            </div>
    </section>

    <div id="trasicao" class="divTransition loginTransition">
        <img src="../img/wallpaper_cadastro.png" alt="">
    </div>

    <section class="cadastro">
        <div class="formInfo">
            <img src="../img/logo.png" alt="">
            <h2>Olá, Bem vindo! <br><span>Cadastre-se </span></h2>

            <input type="text" placeholder="Digite seu Nome: ">
            <input type="text" placeholder="Digite seu Email: ">
            <input type="password" placeholder="Digite sua senha: ">
            <input type="password" placeholder="Confirme sua senha: ">

            <a onclick="transitionLogin()" >Já tem uma conta?</a>


            <button>Cadastrar</button>
        </div>
    </section>

    <script src="../js/cadastro.js"></script>

</body>
</html>
