<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Liberô - Detalhes do anúncio.">
    <title>Liberô - Detalhes do Anúncio</title>
    <link rel="shortcut icon" href="../img/icone.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/detalhes.css">
    <link rel="stylesheet" href="../css/footer.css">
</head>
<body>

    <!-- ── Menu ───────────────────────────────────────────────────────────── -->
    <header>
        <section id="menu" class="menu fixar">
            <div class="containerM">
                <a href="../index.html"><img src="../img/logo.png" alt="Liberô"></a>

                <nav class="explorar">
                    <a href="../index.html">Explorar</a>
                </nav>

                <div class="pesquisa">
                    <input type="text" placeholder="Faça sua pesquisa" aria-label="Pesquisar">
                    <button>Pesquisar</button>
                </div>

                <nav class="perfilMenu" aria-label="Acesso ao perfil">
                    <!-- preenchido por atualizarMenuPerfil() -->
                </nav>
            </div>
        </section>
    </header>

    <!-- ── Conteúdo ───────────────────────────────────────────────────────── -->
    <main class="pagina-detalhes">
        <div id="conteudoDetalhes">
            <div class="carregando">
                <p>Carregando anúncio...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Copyright © 2026 - Liberô</p>
    </footer>

    <!-- Socket.io (requer servidor rodando) -->
    <script src="/socket.io/socket.io.js" onerror="console.info('Socket.io não disponível — inicie o servidor com npm start')"></script>

    <script src="../js/utils.js"></script>
    <script src="../js/database.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/anuncios.js"></script>
    <script src="../js/realtime.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
