<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Liberô - Chat privado">
    <title>Liberô - Chat</title>
    <link rel="shortcut icon" href="../img/icone.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/chat.css">
</head>
<body>

    <!-- ── Menu ─────────────────────────────────────────────────────────────── -->
    <header>
        <section id="menu" class="menu fixar">
            <div class="containerM">
                <a href="../index.html"><img src="../img/logo.png" alt="Liberô"></a>
                <nav class="explorar"><a href="../index.html">Explorar</a></nav>
                <div class="pesquisa">
                    <input type="text" placeholder="Faça sua pesquisa" aria-label="Pesquisar">
                    <button>Pesquisar</button>
                </div>
                <nav class="perfilMenu" aria-label="Acesso ao perfil"></nav>
            </div>
        </section>
    </header>

    <!-- ── Chat ─────────────────────────────────────────────────────────────── -->
    <main class="pagina-chat">
        <div class="chat-wrapper">

            <div class="chat-header" id="chatHeader">
                <a href="perfil.html" class="chat-voltar" aria-label="Voltar ao perfil">←</a>
                <div class="chat-titulo-info">
                    <h2 id="chatNomeOutro">Carregando...</h2>
                    <p id="chatTituloAnuncio" class="chat-subtitulo"></p>
                </div>
                <span class="chat-status desconectado" id="chatStatus">Desconectado</span>
            </div>

            <div class="chat-mensagens" id="chatMensagens" aria-live="polite">
                <p class="chat-carregando">Carregando mensagens...</p>
            </div>

            <div id="feedbackChat" class="feedback" style="display:none" role="alert"></div>

            <div class="chat-input-area">
                <textarea
                    id="inputMensagem"
                    class="chat-textarea"
                    placeholder="Digite sua mensagem... (Enter para enviar)"
                    rows="1"
                    maxlength="1000"
                    aria-label="Mensagem"
                ></textarea>
                <button id="btnEnviar" class="chat-btn-enviar" onclick="enviarMensagem()" aria-label="Enviar mensagem">
                    Enviar
                </button>
            </div>

        </div>
    </main>

    <!-- Socket.io (requer servidor rodando) -->
    <script src="/socket.io/socket.io.js" onerror="console.info('Socket.io não disponível — inicie o servidor com npm start')"></script>

    <script src="../js/utils.js"></script>
    <script src="../js/database.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/anuncios.js"></script>
    <script src="../js/realtime.js"></script>
    <script src="../js/chat.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
