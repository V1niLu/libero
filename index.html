<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Liberô - Anúncios classificados gratuitos. Encontre e publique itens para liberar espaço.">
    <title>Liberô - Anúncios</title>
    <link rel="shortcut icon" href="img/icone.png" type="image/x-icon">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/categoria.css">
    <link rel="stylesheet" href="css/destaque.css">
    <link rel="stylesheet" href="css/produtos.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>

    <header>
        <section id="menu" class="menu fixar">
            <div class="containerM">
                <a href="index.html"><img src="img/logo.png" alt="Liberô"></a>

                <nav class="explorar">
                    <a href="index.html">Explorar</a>
                </nav>

                <div class="pesquisa">
                    <input type="text" id="inputPesquisa" placeholder="Pesquise por título ou descrição" aria-label="Pesquisar anúncios">
                    <button onclick="document.getElementById('inputPesquisa').dispatchEvent(new Event('input'))">Pesquisar</button>
                </div>

                <nav class="perfilMenu" aria-label="Acesso ao perfil">
                    <!-- preenchido por atualizarMenuPerfil() -->
                </nav>
            </div>
        </section>
    </header>

    <main>
        <!-- Seção de destaques: anúncios com ≤ 30% de tempo restante -->
        <section class="destaque" aria-label="Anúncios em destaque">
            <div class="destaque-header">
                <h2>Expirando em breve</h2>
            </div>
            <div id="listagemDestaque" class="containerDestaque">
                <!-- renderizado por app.js -->
            </div>
        </section>

        <!-- Filtros -->
        <section class="category" aria-label="Filtros de categoria">
            <div class="filtros-topo">
                <h3>Explorar itens do Liberô</h3>
                <div class="filtros-ordem">
                    <label for="selectOrdem">Ordenar:</label>
                    <select id="selectOrdem" aria-label="Ordenar anúncios">
                        <option value="recentes">Mais recentes</option>
                        <option value="expirando">Expirando em breve</option>
                    </select>
                </div>
            </div>
            <div class="containerCategory">
                <button class="btn-categoria ativo" data-categoria="todos">Todos</button>
                <button class="btn-categoria" data-categoria="roupas">Roupas</button>
                <button class="btn-categoria" data-categoria="livros">Livros</button>
                <button class="btn-categoria" data-categoria="eletronicos">Eletrônicos</button>
                <button class="btn-categoria" data-categoria="moveis">Móveis</button>
                <button class="btn-categoria" data-categoria="utensilios">Utensílios</button>
                <button class="btn-categoria" data-categoria="maquinas">Máquinas</button>
                <button class="btn-categoria" data-categoria="entulho">Entulho</button>
                <button class="btn-categoria" data-categoria="sucata">Sucata</button>
                <button class="btn-categoria" data-categoria="construcao">Construção</button>
                <button class="btn-categoria" data-categoria="refeicao">Refeição</button>
                <button class="btn-categoria" data-categoria="outros">Outros</button>
            </div>
        </section>

        <!-- Listagem de anúncios -->
        <section class="produtos" aria-label="Listagem de anúncios">
            <div id="listagemProduto" class="containerListagem">
                <!-- renderizado por app.js -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>2026 - Liberô</p>
    </footer>

    <!-- Socket.io (requer servidor rodando) -->
    <script src="/socket.io/socket.io.js" onerror="console.info('Socket.io não disponível — inicie o servidor com npm start')"></script>

    <script src="./js/utils.js"></script>
    <script src="./js/database.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/anuncios.js"></script>
    <script src="./js/realtime.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
